<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="행사 정산">
<meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<title>행사 정산 키오스크</title>
<style>
:root{
  --bg:#FFFFFF;
  --surface:#FFFFFF;
  --surface-alt:#F4F2FC;
  --border:#E7E3F6;
  --ink:#1C1A26;
  --muted:#6F6A85;
  --accent:#7C6CF0;
  --accent-ink:#5A4BC4;
  --accent-soft:#EFEBFE;
  --teal:#14B8A6;
  --teal-soft:#DCF6F2;
  --teal-ink:#0D7A6E;
  --success:#22B568;
  --success-soft:#E1F7EA;
  --success-ink:#15803D;
  --danger:#E5484D;
  --danger-soft:#FCE8E9;
  --warning:#E6A23C;
  --radius-lg:18px;
  --radius-md:12px;
  --radius-sm:8px;
  --shadow:0 1px 2px rgba(28,26,38,.05), 0 8px 24px rgba(28,26,38,.07);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#000000;
    --surface:#161420;
    --surface-alt:#201D2E;
    --border:#322E47;
    --ink:#F1EFFA;
    --muted:#9C96B8;
    --accent:#8273F4;
    --accent-ink:#B8A8FF;
    --accent-soft:#2A2350;
    --teal:#1FAE9D;
    --teal-soft:#123431;
    --teal-ink:#5EEAD4;
    --success:#22B568;
    --success-soft:#123320;
    --success-ink:#4ADE80;
    --danger:#E5484D;
    --danger-soft:#3A1A1B;
    --warning:#E6A23C;
    --shadow:0 1px 2px rgba(0,0,0,.5), 0 8px 24px rgba(0,0,0,.6);
  }
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
  height:100vh;
  display:flex;
  flex-direction:column;
}
button,input,select,textarea{font-family:inherit;}
button{touch-action:manipulation;cursor:pointer;color:inherit;}
input,select,textarea{touch-action:manipulation;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}

#app{display:flex;flex-direction:column;height:100%;}

.topbar{
  display:flex;align-items:center;gap:16px;
  padding:10px 18px;background:var(--surface);
  border-bottom:1px solid var(--border);flex-wrap:wrap;flex:none;
}
.event-switcher{display:flex;align-items:center;gap:8px;}
.event-switcher select{max-width:220px;}
.brand{font-weight:700;font-size:15px;letter-spacing:-.2px;margin-right:4px;color:var(--accent-ink);white-space:nowrap;}
.tabs{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap;}
.tab-btn{
  border:none;background:transparent;color:var(--muted);
  padding:9px 16px;border-radius:999px;font-size:14px;font-weight:600;
}
.tab-btn.active{background:var(--accent);color:#fff;}
.icon-btn{
  border:1px solid var(--border);background:var(--surface);
  width:34px;height:34px;border-radius:999px;display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--muted);padding:0;flex:none;
}

main{flex:1;overflow:auto;padding:18px;}

.btn{
  border:1px solid var(--border);background:var(--surface);color:var(--ink);
  padding:10px 16px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;
  display:inline-flex;align-items:center;gap:6px;line-height:1.2;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-accent{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-teal{background:var(--teal);border-color:var(--teal);color:#fff;}
.btn-danger{background:transparent;color:var(--danger);border-color:var(--danger-soft);}
.btn-ghost{background:transparent;border-color:transparent;color:var(--muted);}
.btn-block{width:100%;justify-content:center;}
.btn-lg{padding:16px;font-size:16px;border-radius:var(--radius-md);}
.btn:disabled{opacity:.4;}

.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.field label{font-size:13px;font-weight:600;color:var(--muted);}
.input,.select,.textarea{
  border:1px solid var(--border);background:var(--surface);
  padding:11px 12px;border-radius:var(--radius-sm);font-size:15px;color:var(--ink);width:100%;
}
.textarea{resize:vertical;min-height:60px;}
.row{display:flex;gap:12px;}
.row>.field{flex:1;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;}
.section-title{font-size:13px;font-weight:700;color:var(--muted);margin:0 0 10px;}

.empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:60px 20px;color:var(--muted);gap:10px;
}
.empty h3{color:var(--ink);font-size:17px;margin:0;}
.empty p{margin:0;font-size:14px;max-width:320px;}

.modal-overlay{
  position:fixed;inset:0;background:rgba(33,29,43,.42);
  display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;
}
.modal-overlay.hidden{display:none;}
.modal{
  background:var(--surface);border-radius:var(--radius-lg);padding:22px;
  width:100%;max-width:420px;max-height:86vh;overflow:auto;
}
.modal h3{margin:0 0 16px;font-size:17px;}
.modal-actions{display:flex;gap:10px;margin-top:18px;}
.modal-actions .btn{flex:1;}

.toast-wrap{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:80;display:flex;flex-direction:column;gap:8px;align-items:center;}
.toast{
  background:var(--accent);color:#fff;padding:11px 20px;border-radius:999px;font-size:14px;font-weight:600;
  box-shadow:var(--shadow);animation:toastIn .18s ease-out;
}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}

.chip-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.chip{
  border:1px solid var(--border);background:var(--surface);color:var(--muted);
  padding:8px 14px;border-radius:999px;font-size:13px;font-weight:600;
}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}

.list{display:flex;flex-direction:column;gap:8px;}
.list-row{
  display:flex;align-items:center;gap:12px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius-md);padding:12px 14px;
}
.list-row .swatch{width:12px;height:12px;border-radius:50%;flex:none;}
.list-row .main{flex:1;min-width:0;}
.list-row .main .t1{font-weight:600;font-size:15px;}
.list-row .main .t2{font-size:13px;color:var(--muted);margin-top:2px;}
.list-row .thumb{width:42px;height:42px;border-radius:var(--radius-sm);background:var(--surface-alt);flex:none;background-size:cover;background-position:center;}
.row-actions{display:flex;gap:6px;flex:none;}

.badge{display:inline-flex;padding:3px 9px;border-radius:999px;font-size:12px;font-weight:700;}
.badge-cash{background:var(--success-soft);color:var(--success-ink);}
.badge-transfer{background:var(--teal-soft);color:var(--teal-ink);}

.sales-layout{display:flex;gap:16px;align-items:flex-start;}
.tag-sidebar{
  width:172px;flex:none;display:flex;flex-direction:column;gap:6px;
  position:sticky;top:0;max-height:calc(100vh - 170px);overflow-y:auto;padding:2px;
}
.tag-sidebar-label{font-size:12px;font-weight:700;color:var(--muted);padding:0 4px 2px;}
.tag-sidebar-item{
  width:100%;text-align:left;padding:13px 16px;border-radius:var(--radius-md);
  border:1px solid var(--border);background:var(--surface);color:var(--ink);
  font-size:14.5px;font-weight:600;flex:none;
}
.tag-sidebar-item.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.sales-main{flex:1;min-width:0;}
.cart-panel{
  width:320px;flex:none;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);display:flex;flex-direction:column;
  position:sticky;top:0;max-height:calc(100vh - 170px);
}
.cart-head{padding:14px 16px 10px;border-top:4px dashed var(--border);border-radius:var(--radius-lg) var(--radius-lg) 0 0;}
.cart-head .label{font-size:13px;font-weight:700;color:var(--muted);}
.cart-items{flex:1;overflow:auto;padding:0 16px;min-height:60px;}
.cart-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.cart-item:last-child{border-bottom:none;}
.cart-item .ci-name{font-size:14px;font-weight:600;}
.cart-item .ci-sub{font-size:12px;color:var(--muted);}
.qty-stepper{display:flex;align-items:center;gap:8px;flex:none;}
.qty-stepper button{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:var(--surface-alt);font-size:14px;line-height:1;padding:0;color:var(--ink);}
.cart-foot{padding:14px 16px;border-top:1px solid var(--border);}
.cart-total{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;}
.cart-total .amt{font-size:22px;font-weight:700;}
.pay-buttons{display:flex;gap:8px;}

.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;}
.product-tile{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);
  overflow:hidden;text-align:left;padding:0;display:flex;flex-direction:column;color:var(--ink);
}
.product-tile:active{transform:scale(.96);}
.product-tile .pt-img{
  width:100%;aspect-ratio:1/1;background:var(--surface-alt);background-size:cover;background-position:center;
  position:relative;display:flex;align-items:center;justify-content:center;
}
.product-tile .pt-img .ph{font-size:11px;color:var(--muted);text-align:center;padding:4px;}
.product-tile .pt-tag{position:absolute;width:9px;height:9px;border-radius:50%;top:8px;left:8px;box-shadow:0 0 0 2px var(--surface);}
.product-tile .pt-info{padding:8px 9px;}
.product-tile .pt-name{font-size:13px;font-weight:600;line-height:1.3;color:var(--ink);}
.product-tile .pt-price{font-size:12px;color:var(--muted);margin-top:2px;}

table.records{width:100%;border-collapse:collapse;font-size:13.5px;}
table.records th{text-align:left;color:var(--muted);font-weight:600;padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap;}
table.records td{padding:9px 10px;border-bottom:1px solid var(--border);white-space:nowrap;}
table.records tbody tr:hover{background:var(--surface-alt);}

.summary-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px;}
.summary-card{background:var(--surface-alt);border-radius:var(--radius-md);padding:14px;}
.summary-card .sc-label{font-size:12.5px;color:var(--muted);font-weight:600;}
.summary-card .sc-val{font-size:21px;font-weight:700;margin-top:4px;}

.img-pick{display:flex;align-items:center;gap:12px;}
.img-pick .preview{width:64px;height:64px;border-radius:var(--radius-sm);background:var(--surface-alt);background-size:cover;background-position:center;flex:none;transition:opacity .15s;}
.img-pick .preview.loading{opacity:.4;}
.settings-subnav{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}

/* room screen */
.room-screen{min-height:100%;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.room-card{width:100%;max-width:380px;}
.room-card h1{font-size:22px;font-weight:800;margin:0 0 4px;color:var(--ink);}
.room-card .subtitle{font-size:14px;color:var(--muted);margin:0 0 28px;}
.room-divider{display:flex;align-items:center;gap:10px;margin:20px 0;}
.room-divider span{color:var(--muted);font-size:12px;font-weight:600;white-space:nowrap;}
.room-divider::before,.room-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.room-code-display{
  font-size:38px;font-weight:800;letter-spacing:10px;color:var(--accent);
  background:var(--accent-soft);border-radius:var(--radius-md);
  padding:22px;text-align:center;margin:14px 0;cursor:pointer;
  border:2px dashed var(--accent);
}
.room-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--accent-soft);color:var(--accent);
  border-radius:999px;padding:4px 10px 4px 8px;font-size:12px;font-weight:700;
  border:1px solid var(--accent);cursor:pointer;
}
.room-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--success);flex:none;}

/* transaction grouping */
.tx-row{cursor:pointer;}
.tx-row:active,.tx-row:hover{background:var(--surface-alt);}
.tx-items-inner{padding:6px 8px 6px 36px;background:var(--surface-alt);}
.tx-item-detail{display:flex;gap:8px;align-items:center;padding:5px 0;font-size:12.5px;border-bottom:1px solid var(--border);}
.tx-item-detail:last-child{border-bottom:none;}
.tx-item-detail .ti-name{flex:1;font-weight:600;min-width:0;}
.tx-item-detail .ti-meta{color:var(--muted);}
.tx-chevron{font-size:10px;color:var(--muted);transition:transform .15s;display:inline-block;}
.sort-bar{display:flex;align-items:center;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.sort-bar-label{font-size:12px;font-weight:700;color:var(--muted);white-space:nowrap;padding-right:2px;}
.sort-chip{border:1px solid var(--border);background:transparent;color:var(--muted);padding:4px 12px;border-radius:999px;font-size:12px;font-weight:600;}
.sort-chip.active{background:var(--accent-soft);color:var(--accent);border-color:var(--accent);}
.list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:12px;}
.list-header .sort-bar{margin-bottom:0;flex:1;}

.hidden{display:none !important;}
@media (max-width:760px){
  .sales-layout{flex-direction:column;}
  .cart-panel{width:100%;position:static;max-height:none;}
  .tag-sidebar{
    width:100%;flex-direction:row;overflow-x:auto;overflow-y:visible;
    max-height:none;position:static;
  }
  .tag-sidebar-label{display:none;}
  .tag-sidebar-item{width:auto;white-space:nowrap;}
}
</style>

<body>
<div id="app">
  <header class="topbar">
    <span class="brand">행사 정산</span>
    <div class="event-switcher" id="eventSwitcher"></div>
    <nav class="tabs" id="mainTabs"></nav>
  </header>
  <main id="mainContent"></main>
</div>
<div class="modal-overlay hidden" id="modalRoot"></div>
<div class="toast-wrap" id="toastRoot"></div>

<script>
/* ============ Firestore REST API (SDK-free) ============ */
const _FS='https://firestore.googleapis.com/v1/projects/settlementssc/databases/(default)/documents';
const _KEY='AIzaSyCf4mPxR6BItglbtLesw8RpU6sJfxia8lM';
let _pollTimer=null,_lastSnap='';

/* JS <-> Firestore 타입 변환 */
function _j2f(v){
  if(v===null||v===undefined)return{nullValue:null};
  if(typeof v==='boolean')return{booleanValue:v};
  if(typeof v==='number')return Number.isInteger(v)?{integerValue:String(v)}:{doubleValue:v};
  if(typeof v==='string')return{stringValue:v};
  if(Array.isArray(v))return{arrayValue:{values:v.map(_j2f)}};
  if(typeof v==='object'){const f={};for(const[k,val]of Object.entries(v))f[k]=_j2f(val);return{mapValue:{fields:f}};}
  return{stringValue:String(v)};
}
function _f2j(f){
  if(!f)return null;
  if('nullValue'in f)return null;
  if('booleanValue'in f)return f.booleanValue;
  if('integerValue'in f)return Number(f.integerValue);
  if('doubleValue'in f)return f.doubleValue;
  if('stringValue'in f)return f.stringValue;
  if('arrayValue'in f)return(f.arrayValue.values||[]).map(_f2j);
  if('mapValue'in f){const o={};for(const[k,v]of Object.entries(f.mapValue.fields||{}))o[k]=_f2j(v);return o;}
  return null;
}

/* REST 기본 함수 */
async function _fsGet(path){
  const r=await fetch(_FS+'/'+path+'?key='+_KEY);
  if(r.status===404)return null;
  if(!r.ok)throw new Error('Firestore GET '+r.status+' '+path);
  const d=await r.json();
  return d.fields?_f2j({mapValue:{fields:d.fields}}):null;
}
async function _fsSet(path,obj){
  const w=_j2f(obj);
  const fields=w.mapValue?w.mapValue.fields:{};
  const r=await fetch(_FS+'/'+path+'?key='+_KEY,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields})});
  if(!r.ok)throw new Error('Firestore SET '+r.status+' '+path);
}
async function _fsDel(path){
  const r=await fetch(_FS+'/'+path+'?key='+_KEY,{method:'DELETE'});
  if(!r.ok&&r.status!==404)throw new Error('Firestore DEL '+r.status);
}
async function _fsList(path){
  const r=await fetch(_FS+'/'+path+'?key='+_KEY);
  if(r.status===404)return[];
  if(!r.ok)throw new Error('Firestore LIST '+r.status+' '+path);
  const d=await r.json();
  return(d.documents||[]).map(doc=>doc.fields?_f2j({mapValue:{fields:doc.fields}}):null).filter(Boolean);
}

/* 도메인 헬퍼 */
async function fsGetEvents(){return _fsList('rooms/'+state.roomCode+'/events');}
async function fsSaveEvent(ev){await _fsSet('rooms/'+state.roomCode+'/events/'+ev.id,JSON.parse(JSON.stringify(ev)));}
async function fsDeleteEvent(id){await _fsDel('rooms/'+state.roomCode+'/events/'+id);}
async function fsSaveImage(id,b64){await _fsSet('rooms/'+state.roomCode+'/images/'+id,{data:b64});}
async function fsGetImage(id){const d=await _fsGet('rooms/'+state.roomCode+'/images/'+id);return d?d.data:null;}
async function fsRoomExists(code){return(await _fsGet('rooms/'+code))!==null;}
async function fsCreateRoom(code){await _fsSet('rooms/'+code,{createdAt:new Date().toISOString()});}

/* ============ IndexedDB (이미지 로컬 캐시) ============ */
const IDB_NAME='subkiosk-imgcache',IDB_VERSION=1;
let idb=null;
function openIDB(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open(IDB_NAME,IDB_VERSION);
    req.onupgradeneeded=(e)=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('images')) d.createObjectStore('images',{keyPath:'id'});
    };
    req.onsuccess=(e)=>{idb=e.target.result;resolve(idb);};
    req.onerror=(e)=>reject(e);
  });
}
function idbGet(id){
  return new Promise((resolve)=>{
    if(!idb){resolve(null);return;}
    const tx=idb.transaction('images','readonly');
    const req=tx.objectStore('images').get(id);
    req.onsuccess=()=>resolve(req.result||null);
    req.onerror=()=>resolve(null);
  });
}
function idbPut(rec){
  return new Promise((resolve)=>{
    if(!idb){resolve();return;}
    const tx=idb.transaction('images','readwrite');
    tx.objectStore('images').put(rec);
    tx.oncomplete=()=>resolve();
    tx.onerror=()=>resolve();
  });
}



/* Legacy stubs */
async function dbDelete(store,id){
  if(store==='events') await fsDeleteEvent(id);
}
async function dbPut(store,value){
  if(store==='images') await idbPut(value);
}

/* ============ utils ============ */
function uid(){
  if(window.crypto && crypto.randomUUID) return crypto.randomUUID();
  return 'id-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,10);
}
function won(n){
  const r=Math.round(n||0);
  return (r<0?'-₩':'₩')+Math.abs(r).toLocaleString('ko-KR');
}
function nowISO(){return new Date().toISOString();}
function fmtDateTime(iso){
  const d=new Date(iso);
  return d.toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
}
function fmtDate(iso){
  if(!iso) return '';
  const d=new Date(iso+'T00:00:00');
  return d.toLocaleDateString('ko-KR',{month:'numeric',day:'numeric'});
}
function escapeHTML(s){
  return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function loadImageElement(file){
  return new Promise((resolve,reject)=>{
    const url=URL.createObjectURL(file);
    const img=new Image();
    img.onload=()=>resolve(img);
    img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('이미지를 읽을 수 없어요'));};
    img.src=url;
  });
}
async function resizeImageFile(file,maxSize=480,quality=0.82){
  let drawable,width,height;
  try{
    if(!window.createImageBitmap) throw new Error('unsupported');
    drawable=await createImageBitmap(file);
    width=drawable.width;height=drawable.height;
  }catch(e){
    drawable=await loadImageElement(file);
    width=drawable.naturalWidth||drawable.width;
    height=drawable.naturalHeight||drawable.height;
  }
  if(!width||!height) throw new Error('이미지 크기를 확인할 수 없어요');
  let w=width,h=height;
  if(w>=h && w>maxSize){h=Math.round(h*maxSize/w);w=maxSize;}
  else if(h>w && h>maxSize){w=Math.round(w*maxSize/h);h=maxSize;}
  const canvas=document.createElement('canvas');
  canvas.width=w;canvas.height=h;
  const ctx=canvas.getContext('2d');
  ctx.drawImage(drawable,0,0,w,h);
  return new Promise((resolve,reject)=>{
    canvas.toBlob(b=>{ if(b) resolve(b); else reject(new Error('이미지 변환에 실패했어요')); },'image/jpeg',quality);
  });
}
function downloadBlob(blob,filename){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),3000);
}
function csvCell(v){
  const s=String(v??'');
  if(/[",\n]/.test(s)) return '"'+s.replace(/"/g,'""')+'"';
  return s;
}
function toCSV(rows){return rows.map(r=>r.map(csvCell).join(',')).join('\r\n');}
function exportCSV(rows,filename){
  const csv='\uFEFF'+toCSV(rows);
  downloadBlob(new Blob([csv],{type:'text/csv;charset=utf-8;'}),filename);
}
function toast(msg){
  const root=document.getElementById('toastRoot');
  const el=document.createElement('div');
  el.className='toast';el.textContent=msg;
  root.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

function blobToBase64(blob){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>resolve(r.result);
    r.onerror=reject;
    r.readAsDataURL(blob);
  });
}

let imageUrlCache=new Map();
async function getImageUrl(imageId){
  if(!imageId) return null;
  if(imageUrlCache.has(imageId)) return imageUrlCache.get(imageId);
  // 1) 로컬 IndexedDB 캐시
  try{
    const rec=await idbGet(imageId);
    if(rec&&rec.blob){
      const url=URL.createObjectURL(rec.blob);
      imageUrlCache.set(imageId,url);
      return url;
    }
  }catch(e){}
  // 2) Firestore에서 가져오기
  if(!state||!state.roomCode) return null;
  try{
    const base64=await fsGetImage(imageId);
    if(base64){
      imageUrlCache.set(imageId,base64);
      // 로컬에 캐시
      fetch(base64).then(r=>r.blob()).then(blob=>idbPut({id:imageId,blob})).catch(()=>{});
      return base64;
    }
  }catch(e){}
  return null;
}
function fillImageBackgrounds(containerSelector){
  const els=document.querySelectorAll(containerSelector+' [data-img]');
  els.forEach(async(el)=>{
    const id=el.dataset.img;
    if(!id) return;
    const url=await getImageUrl(id);
    if(url) el.style.backgroundImage='url('+url+')';
  });
}

/* ============ event delegation ============ */
const handlers={};
function onAction(name,fn){handlers[name]=fn;}

document.addEventListener('click',(e)=>{
  const el=e.target.closest('[data-action]');
  if(!el) return;
  const fn=handlers[el.dataset.action];
  if(fn){ e.stopPropagation(); fn(el,e); }
});
document.addEventListener('change',(e)=>{
  const el=e.target.closest('[data-change]');
  if(!el) return;
  const fn=handlers[el.dataset.change];
  if(fn) fn(el,e);
});
document.addEventListener('input',(e)=>{
  const el=e.target.closest('[data-livechange]');
  if(!el) return;

  if(fn) fn(el,e);
});

function renderTabPreserveFocus(){
  const active=document.activeElement;
  const id=active&&active.id;
  const selStart=(active&&typeof active.selectionStart==='number')?active.selectionStart:null;
  const selEnd=(active&&typeof active.selectionEnd==='number')?active.selectionEnd:null;
  renderTab();
  if(id){
    const el=document.getElementById(id);
    if(el){
      el.focus();
      if(selStart!=null && el.setSelectionRange){
        try{el.setSelectionRange(selStart,selEnd);}catch(err){}
      }
    }
  }
}

function closeModal(){

let pendingConfirmCallback=null;
function confirmAction(message,onConfirm,confirmLabel){

  openModal(
    '<h3>확인해주세요</h3>'+
    '<p style="color:var(--muted);font-size:14px;line-height:1.5;margin:0;">'+escapeHTML(message)+'</p>'+

    '</div>'
  );
}
onAction('confirmYes',async()=>{

<script>
/* ============ app shell ============ */
const TABS=[

  {id:'records',label:'기록'},
  {id:'expenses',label:'지출'},

];

/* -------- room screen -------- */
function renderRoomScreen(){

onAction('createRoom',async()=>{
  const btn=document.querySelector('[data-action="createRoom"]');
  if(btn) btn.disabled=true;
  try{
    const code=Array.from({length:6},()=>'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'[Math.floor(Math.random()*32)]).join('');
    await fsCreateRoom(code);
    localStorage.setItem('ssc_room',code);
    state.roomCode=code;
    await enterRoom(code);
  }catch(err){
    toast('방 생성 실패: '+(err&&err.message?err.message:String(err)));
    if(btn) btn.disabled=false;
  }
});

onAction('joinRoom',async()=>{
  const code=(document.getElementById('f_roomcode').value||'').trim().toUpperCase();
  if(code.length!==6){toast('6자리 코드를 입력해주세요');return;}
  const btn=document.querySelector('[data-action="joinRoom"]');
  if(btn) btn.disabled=true;
  try{
    const exists=await fsRoomExists(code);
    if(!exists){toast('존재하지 않는 방이에요');if(btn) btn.disabled=false;return;}
    localStorage.setItem('ssc_room',code);
    state.roomCode=code;
    await enterRoom(code);
  }catch(err){
    toast('입장 실패: '+(err&&err.message?err.message:String(err)));
    if(btn) btn.disabled=false;
  }
});

async function enterRoom(code){
  state.roomCode=code;
  const events=await fsGetEvents();
  events.forEach(migrateEvent);
  state.events=events;
  if(state.events.length>0) state.currentEventId=state.events[0].id;
  attachRoomListener(code);
  renderApp();
}

function attachRoomListener(code){
  if(_pollTimer) clearInterval(_pollTimer);
  _lastSnap='';
  _pollTimer=setInterval(async()=>{
    if(state.syncingFromLocal||!state.roomCode) return;
    const modal=document.getElementById('modalRoot');
    if(modal&&!modal.classList.contains('hidden')) return;
    try{
      const events=await fsGetEvents();
      const snap=events.map(e=>e.id+':'+(e.transactions||[]).length+':'+(e.products||[]).length).join('|');
      if(snap===_lastSnap) return;
      _lastSnap=snap;
      events.forEach(migrateEvent);
      state.events=events;
      if(!state.currentEventId&&state.events.length>0) state.currentEventId=state.events[0].id;
      renderApp();
    }catch(e){}
  },5000);
}

onAction('leaveRoom',()=>{
  confirmAction('방에서 나가면 이 기기에서 데이터 접근이 끊겨요. 나가시겠어요?',()=>{
    localStorage.removeItem('ssc_room');
    if(_pollTimer){clearInterval(_pollTimer);_pollTimer=null;}
    state.roomCode=null;
    state.events=[];
    state.currentEventId=null;
    imageUrlCache.clear();
    renderRoomScreen();
  },'나가기');
});

function renderApp(){
  if(!state.roomCode){renderRoomScreen();return;}
  const switcher=document.getElementById('eventSwitcher');
  const tabsNav=document.getElementById('mainTabs');
  const main=document.getElementById('mainContent');

  const roomBadge='<span class="room-badge" data-action="copyRoomCode" title="클릭하면 복사">'+
    '<span class="dot"></span>'+state.roomCode+'</span>';

  if(state.events.length===0){
    switcher.innerHTML=roomBadge;
    tabsNav.innerHTML='';
    main.innerHTML=renderOnboarding();
    return;

  if(!currentEvent()) state.currentEventId=state.events[0].id;

    roomBadge+
    '<select data-change="switchEvent">'+

  renderTab();
}

});

/* ---- sessions ---- */
function renderSessionsList(ev){
  const SORTS=[{k:'created',l:'등록순'},{k:'date',l:'날짜순'},{k:'name',l:'이름순'}];
  const cur=state.settingsSortOrders.sessions;
  const sorted=ev.sessions.slice().sort((a,b)=>{
    if(cur==='date'){
      if(!a.date&&!b.date) return 0;
      if(!a.date) return 1; if(!b.date) return -1;
      return a.date.localeCompare(b.date);
    }
    if(cur==='name') return (a.label||'').localeCompare(b.label||'','ko',{numeric:true,sensitivity:'base'});
    return 0; // created = 등록순 유지
  });
  if(ev.sessions.length===0){
    return '<div class="empty"><h3>세션이 없어요</h3><p>토요일, 1주차 등 원하는 단위로 세션을 만들고 날짜·메모를 남겨보세요.</p><button class="btn btn-accent" data-action="newSession">+ 세션 추가</button></div>';
  }
  return '<div class="list-header">'+
      '<div class="sort-bar"><span class="sort-bar-label">정렬</span>'+
        SORTS.map(s=>'<button class="sort-chip '+(cur===s.k?'active':'')+'" data-action="setSettingsSort" data-sub="sessions" data-key="'+s.k+'">'+s.l+'</button>').join('')+
      '</div>'+
      '<button class="btn btn-accent" style="flex:none;" data-action="newSession">+ 세션 추가</button>'+
    '</div>'+
    '<div class="list">'+
    sorted.map(s=>
      '<div class="list-row">'+
        '<div class="main">'+
          '<div class="t1">'+escapeHTML(s.label)+(s.date?' <span style="color:var(--muted);font-weight:400;">· '+fmtDate(s.date)+'</span>':'')+'</div>'+
          (s.memo?'<div class="t2">'+escapeHTML(s.memo)+'</div>':'')+
        '</div>'+
        '<div class="row-actions">'+
          '<button class="btn btn-ghost" data-action="editSession" data-id="'+s.id+'">수정</button>'+
        '</div>'+
      '</div>'
    ).join('')+
    '</div>';
}

/* ---- artists ---- */
function renderArtistsList(ev){
  const SORTS=[{k:'name',l:'이름순'},{k:'products',l:'상품 수'},{k:'sales',l:'매출순'}];
  const cur=state.settingsSortOrders.artists;
  const sorted=ev.artists.slice().sort((a,b)=>{
    if(cur==='products'){
      return ev.products.filter(p=>p.artistId===b.id).length - ev.products.filter(p=>p.artistId===a.id).length;
    }
    if(cur==='sales'){
      const salesOf=(id)=>ev.transactions.reduce((s,t)=>s+t.items.filter(i=>i.artistId===id).reduce((ss,i)=>ss+i.subtotal,0),0);
      return salesOf(b.id)-salesOf(a.id);
    }
    return (a.name||'').localeCompare(b.name||'','ko',{numeric:true,sensitivity:'base'});
  });
  if(ev.artists.length===0){
    return '<div class="empty"><h3>작가가 없어요</h3><p>부스에 참여하는 작가를 등록하면 상품·매출을 작가별로 관리할 수 있어요.</p><button class="btn btn-accent" data-action="newArtist">+ 작가 추가</button></div>';
  }
  return '<div class="list-header">'+
      '<div class="sort-bar"><span class="sort-bar-label">정렬</span>'+
        SORTS.map(s=>'<button class="sort-chip '+(cur===s.k?'active':'')+'" data-action="setSettingsSort" data-sub="artists" data-key="'+s.k+'">'+s.l+'</button>').join('')+
      '</div>'+
      '<button class="btn btn-accent" style="flex:none;" data-action="newArtist">+ 작가 추가</button>'+
    '</div>'+
    '<div class="list">'+
    sorted.map(a=>
      '<div class="list-row">'+
        '<span class="swatch" style="background:'+a.color+'"></span>'+
        '<div class="main"><div class="t1">'+escapeHTML(a.name)+'</div></div>'+
        '<div class="row-actions"><button class="btn btn-ghost" data-action="editArtist" data-id="'+a.id+'">수정</button></div>'+
      '</div>'
    ).join('')+
    '</div>';
}

/* ---- products ---- */
function renderProductsList(ev){
  const SORTS=[
    {k:'name',l:'이름순'},{k:'price_asc',l:'가격 낮은순'},{k:'price_desc',l:'가격 높은순'},
    {k:'artist',l:'작가순'},{k:'tag',l:'태그순'}
  ];
  const cur=state.settingsSortOrders.products;
  const sorted=ev.products.slice().sort((a,b)=>{
    if(cur==='price_asc') return (a.price||0)-(b.price||0);
    if(cur==='price_desc') return (b.price||0)-(a.price||0);
    if(cur==='artist'){
      const na=(ev.artists.find(x=>x.id===a.artistId)||{}).name||'';
      const nb=(ev.artists.find(x=>x.id===b.artistId)||{}).name||'';
      return na.localeCompare(nb,'ko',{numeric:true,sensitivity:'base'});
    }
    if(cur==='tag'){
      const na=(ev.tags.find(x=>x.id===a.tagId)||{}).name||'';
      const nb=(ev.tags.find(x=>x.id===b.tagId)||{}).name||'';
      return na.localeCompare(nb,'ko',{numeric:true,sensitivity:'base'});
    }
    return (a.detailName||'').localeCompare(b.detailName||'','ko',{numeric:true,sensitivity:'base'});
  });
  if(ev.products.length===0){
    return '<div class="empty"><h3>상품이 없어요</h3><p>이미지와 가격을 등록하면 판매 화면에서 바로 사용할 수 있어요.</p><button class="btn btn-accent" data-action="newProduct">+ 상품 추가</button></div>';
  }
  return '<div class="list-header">'+
      '<div class="sort-bar"><span class="sort-bar-label">정렬</span>'+
        SORTS.map(s=>'<button class="sort-chip '+(cur===s.k?'active':'')+'" data-action="setSettingsSort" data-sub="products" data-key="'+s.k+'">'+s.l+'</button>').join('')+
      '</div>'+
      '<button class="btn btn-accent" style="flex:none;" data-action="newProduct">+ 상품 추가</button>'+
    '</div>'+
    '<div class="list">'+
    sorted.map(p=>{
      const artist=ev.artists.find(a=>a.id===p.artistId);
      const tag=ev.tags.find(t=>t.id===p.tagId);
      return '<div class="list-row">'+
          '<div class="thumb" data-img="'+(p.imageId||'')+'"></div>'+
          '<div class="main">'+
            '<div class="t1">'+escapeHTML(p.detailName||'(이름 없음)')+'</div>'+
            '<div class="t2">'+(artist?escapeHTML(artist.name):'작가 미지정')+' · '+won(p.price)+(tag?' · '+escapeHTML(tag.name):'')+'</div>'+
          '</div>'+
          '<div class="row-actions"><button class="btn btn-ghost" data-action="editProduct" data-id="'+p.id+'">수정</button></div>'+
        '</div>';
    }).join('')+
    '</div>';
}
let pendingImageBlob=null;
handlers.pickImage=async(el)=>{
  const file=el.files&&el.files[0];
  if(!file) return;
  const prev=document.getElementById('f_preview');
  if(prev){ prev.style.backgroundImage=''; prev.classList.add('loading'); }
  try{
    const blob=await resizeImageFile(file);
    pendingImageBlob=blob;
    if(prev) prev.style.backgroundImage='url('+URL.createObjectURL(blob)+')';
  }catch(err){
    try{
      pendingImageBlob=file;
      if(prev) prev.style.backgroundImage='url('+URL.createObjectURL(file)+')';
      toast('원본 크기로 저장했어요');
    }catch(err2){
      pendingImageBlob=null;
      toast('이미지를 불러오지 못했어요. 다른 사진으로 시도해주세요');
    }
  }finally{
    if(prev) prev.classList.remove('loading');
  }
};
function tagOptionsHTML(ev,selectedId){
  return '<option value="">미지정</option>'+
    ev.tags.map(t=>'<option value="'+t.id+'" '+(t.id===selectedId?'selected':'')+'>'+escapeHTML(t.name)+'</option>').join('');
}
onAction('addInlineTag',async()=>{
  const input=document.getElementById('f_newtag');
  const name=input.value.trim();
  if(!name) return;
  const ev=currentEvent();
  let tag=ev.tags.find(t=>t.name===name);
  if(!tag){ tag={id:uid(),name}; ev.tags.push(tag); await saveEvent(); }
  input.value='';
  const select=document.getElementById('f_tag');
  if(select) select.innerHTML=tagOptionsHTML(ev,tag.id);
});
function productFormHTML(p,ev){
  return '<div class="img-pick">'+
      '<div class="preview" id="f_preview"></div>'+

    '<div class="row">'+
      '<div class="field"><label>작가</label><select class="select" id="f_artist"><option value="">미지정</option>'+
        ev.artists.map(a=>'<option value="'+a.id+'" '+(p&&p.artistId===a.id?'selected':'')+'>'+escapeHTML(a.name)+'</option>').join('')+
      '</select></div>'+
      '<div class="field"><label>가격</label><input class="input" type="number" inputmode="numeric" min="0" id="f_price" placeholder="0" value="'+(p?p.price:'')+'"></div>'+
    '</div>'+
    '<div class="field"><label>태그 (분류 기준, 선택)</label>'+

      '</div>'+
    '</div>';
}
onAction('newProduct',()=>{
  pendingImageBlob=null;
  const ev=currentEvent();
  openModal('<h3>상품 추가</h3>'+productFormHTML(null,ev)+
    '<div class="modal-actions">'+
      '<button class="btn" data-action="closeModal">취소</button>'+
      '<button class="btn btn-primary" data-action="saveNewProduct">추가</button>'+
    '</div>');
});
async function saveImageBlob(blob){
  const imageId=uid();
  try{
    const base64=await blobToBase64(blob);
    await fsSaveImage(imageId,base64);
    await idbPut({id:imageId,blob});
    imageUrlCache.set(imageId,base64);
  }catch(e){ console.error('이미지 저장 실패',e); }
  return imageId;
}
onAction('saveNewProduct',async()=>{
  const detailName=document.getElementById('f_detail').value.trim();
  const price=Number(document.getElementById('f_price').value)||0;
  if(!detailName){toast('세부품목명을 입력해주세요');return;}
  try{
    let imageId=null;
    if(pendingImageBlob) imageId=await saveImageBlob(pendingImageBlob);
    const ev=currentEvent();
    ev.products.push({
      id:uid(),detailName,
      artistId:document.getElementById('f_artist').value||null,price,imageId,
      tagId:document.getElementById('f_tag').value||null
    });
    await saveEvent();closeModal();renderTab();toast('상품을 추가했어요');
  }catch(err){
    toast('저장 중 오류: '+(err&&err.message?err.message:String(err)));
  }
});
onAction('editProduct',(el)=>{
  const ev=currentEvent();
  const p=ev.products.find(x=>x.id===el.dataset.id);
  pendingImageBlob=null;
  openModal('<h3>상품 수정</h3>'+productFormHTML(p,ev)+
    '<div class="modal-actions">'+
      '<button class="btn btn-danger" data-action="deleteProductConfirmed" data-id="'+p.id+'">삭제</button>'+
      '<button class="btn btn-primary" data-action="saveEditProduct" data-id="'+p.id+'">저장</button>'+
    '</div>');
  if(p.imageId) getImageUrl(p.imageId).then(url=>{
    const prev=document.getElementById('f_preview');
    if(url && prev) prev.style.backgroundImage='url('+url+')';
  });
});
onAction('saveEditProduct',async(el)=>{
  const ev=currentEvent();
  const p=ev.products.find(x=>x.id===el.dataset.id);
  const detailName=document.getElementById('f_detail').value.trim();
  if(!detailName){toast('세부품목명을 입력해주세요');return;}
  try{
    p.detailName=detailName;
    p.artistId=document.getElementById('f_artist').value||null;
    p.price=Number(document.getElementById('f_price').value)||0;
    p.tagId=document.getElementById('f_tag').value||null;
    if(pendingImageBlob) p.imageId=await saveImageBlob(pendingImageBlob);
    await saveEvent();closeModal();renderTab();
  }catch(err){
    toast('저장 중 오류: '+(err&&err.message?err.message:String(err)));
  }
});
onAction('deleteProductConfirmed',(el)=>{
  const id=el.dataset.id;
  confirmAction('이 상품을 삭제할까요?',async()=>{
    const ev=currentEvent();
    ev.products=ev.products.filter(x=>x.id!==id);
    await saveEvent();renderTab();
  });
});
</script>
<script>
/* ============ sales tab ============ */
function renderSalesTab(){
  const ev=currentEvent();
  if(ev.sessions.length===0){
    return '<div class="empty"><h3>먼저 세션을 만들어주세요</h3><p>설정 탭에서 세션을 추가하면 판매를 시작할 수 있어요.</p><button class="btn btn-accent" data-action="goSettingsSessions">세션 만들러 가기</button></div>';
  }
  if(!state.currentSessionId || !ev.sessions.find(s=>s.id===state.currentSessionId)){
    state.currentSessionId=ev.sessions[ev.sessions.length-1].id;
  }
  if(ev.products.length===0){
    return sessionSelectHTML(ev)+'<div class="empty"><h3>등록된 상품이 없어요</h3><p>설정 탭에서 상품을 추가하면 여기서 바로 판매할 수 있어요.</p><button class="btn btn-accent" data-action="goSettingsProducts">상품 만들러 가기</button></div>';
  }
  const filtered=ev.products.filter(p=>
    (!state.posArtistFilter||p.artistId===state.posArtistFilter) &&
    (!state.posTagFilter||p.tagId===state.posTagFilter)
  ).sort((a,b)=>(a.detailName||'').localeCompare(b.detailName||'','ko',{numeric:true,sensitivity:'base'}));
  return sessionSelectHTML(ev)+
    '<div class="chip-row">'+
      '<button class="chip '+(!state.posArtistFilter?'active':'')+'" data-action="posFilterArtist" data-id="">전체 작가</button>'+
      ev.artists.map(a=>'<button class="chip '+(state.posArtistFilter===a.id?'active':'')+'" data-action="posFilterArtist" data-id="'+a.id+'">'+escapeHTML(a.name)+'</button>').join('')+
    '</div>'+
    '<div class="sales-layout">'+
      (ev.tags.length>0?
        '<div class="tag-sidebar">'+
          '<div class="tag-sidebar-label">태그</div>'+
          '<button class="tag-sidebar-item '+(!state.posTagFilter?'active':'')+'" data-action="posFilterTag" data-id="">전체</button>'+
          ev.tags.map(t=>'<button class="tag-sidebar-item '+(state.posTagFilter===t.id?'active':'')+'" data-action="posFilterTag" data-id="'+t.id+'">'+escapeHTML(t.name)+'</button>').join('')+
        '</div>'
      :'')+
      '<div class="sales-main"><div class="product-grid">'+
        filtered.map(p=>{
          const artist=ev.artists.find(a=>a.id===p.artistId);
          return '<button class="product-tile" data-action="addToCart" data-id="'+p.id+'">'+
              '<div class="pt-img" data-img="'+(p.imageId||'')+'">'+
                (artist?'<span class="pt-tag" style="background:'+artist.color+'"></span>':'')+
                (!p.imageId?'<span class="ph">사진 없음</span>':'')+
              '</div>'+
              '<div class="pt-info">'+
                '<div class="pt-name">'+escapeHTML(p.detailName||'(이름 없음)')+'</div>'+
                '<div class="pt-price">'+won(p.price)+'</div>'+
              '</div>'+
            '</button>';
        }).join('')+
      '</div></div>'+
      cartPanelHTML(ev)+
    '</div>';
}
function sessionSelectHTML(ev){
  return '<div class="field" style="max-width:280px;margin-bottom:14px;">'+
    '<label>현재 세션</label>'+
    '<select class="select" data-change="setCurrentSession">'+

}
function cartPanelHTML(ev){
  const lines=state.cart.map(c=>{
    const p=ev.products.find(x=>x.id===c.productId);
    return {p,qty:c.qty,sub:p.price*c.qty};

    '<div class="cart-head"><div class="label">결제창 · '+totalQty+'개</div></div>'+

        lines.map(l=>
          '<div class="cart-item">'+
            '<div style="flex:1;min-width:0;">'+
              '<div class="ci-name">'+escapeHTML(l.p.detailName)+'</div>'+
              '<div class="ci-sub">'+won(l.p.price)+'</div>'+
            '</div>'+
            '<div class="qty-stepper">'+
              '<button data-action="cartDec" data-id="'+l.p.id+'">−</button>'+
              '<span>'+l.qty+'</span>'+
              '<button data-action="cartInc" data-id="'+l.p.id+'">+</button>'+
            '</div>'+
            '<div style="width:64px;text-align:right;font-weight:600;font-size:13px;">'+won(l.sub)+'</div>'+
          '</div>'
        ).join('')
      )+
    '</div>'+
    '<div class="cart-foot">'+
      '<div class="cart-total"><span>합계</span><span class="amt">'+won(total)+'</span></div>'+
      '<div class="pay-buttons">'+
        '<button class="btn btn-teal btn-lg" style="flex:1;" data-action="checkout" data-method="cash" '+(lines.length===0?'disabled':'')+'>현금 결제</button>'+
        '<button class="btn btn-accent btn-lg" style="flex:1;" data-action="checkout" data-method="transfer" '+(lines.length===0?'disabled':'')+'>계좌이체</button>'+
      '</div>'+
      (lines.length>0?'<button class="btn btn-ghost btn-block" style="margin-top:8px;" data-action="clearCart">전체 취소</button>':'')+
    '</div>'+
  '</div>';
}
function afterRenderSales(){ fillImageBackgrounds('#mainContent'); }

onAction('goSettingsSessions',()=>{state.currentTab='settings';state.settingsSubTab='sessions';renderApp();});
onAction('goSettingsProducts',()=>{state.currentTab='settings';state.settingsSubTab='products';renderApp();});
onAction('posFilterArtist',(el)=>{state.posArtistFilter=el.dataset.id||null;renderTab();});
onAction('posFilterTag',(el)=>{state.posTagFilter=el.dataset.id||null;renderTab();});
handlers.setCurrentSession=(el)=>{state.currentSessionId=el.value;renderTab();};

onAction('addToCart',(el)=>{
  const id=el.dataset.id;
  const line=state.cart.find(c=>c.productId===id);
  if(line) line.qty++; else state.cart.push({productId:id,qty:1});
  renderTab();
});
onAction('cartInc',(el)=>{
  const line=state.cart.find(c=>c.productId===el.dataset.id);
  if(line) line.qty++;
  renderTab();
});
onAction('cartDec',(el)=>{
  const line=state.cart.find(c=>c.productId===el.dataset.id);
  if(line){line.qty--; if(line.qty<=0) state.cart=state.cart.filter(c=>c!==line);}
  renderTab();
});
onAction('clearCart',()=>{state.cart=[];renderTab();});
onAction('checkout',async(el)=>{
  const ev=currentEvent();
  const method=el.dataset.method;
  const items=state.cart.map(c=>{
    const p=ev.products.find(x=>x.id===c.productId);
    const artist=ev.artists.find(a=>a.id===p.artistId);
    return{productId:p.id,detailName:p.detailName,artistId:p.artistId,artistName:artist?artist.name:'',unitPrice:p.price,qty:c.qty,subtotal:p.price*c.qty};
  });
  const total=items.reduce((s,i)=>s+i.subtotal,0);
  ev.transactions.push({id:uid(),sessionId:state.currentSessionId,timestamp:nowISO(),paymentMethod:method,items,total});
  await saveEvent();
  state.cart=[];
  renderTab();
  toast(method==='cash'?'현금 결제 완료':'계좌이체 결제 완료');
});
</script>
<script>
/* ============ records tab ============ */
/* flattenTransactions는 CSV 내보내기에서 여전히 사용 */
function flattenTransactions(ev){
  const rows=[];
  ev.transactions.forEach(t=>{
    const session=ev.sessions.find(s=>s.id===t.sessionId);
    t.items.forEach(it=>{
      const product=ev.products.find(p=>p.id===it.productId);
      const tagId=product?(product.tagId||null):null;
      const tag=tagId?ev.tags.find(x=>x.id===tagId):null;
      rows.push({
        ts:t.timestamp,sessionLabel:session?session.label:'(삭제된 세션)',sessionId:t.sessionId,
        artistId:it.artistId,artistName:it.artistName||'미지정',productId:it.productId,
        detailName:it.detailName,tagId,tagName:tag?tag.name:'',
        qty:it.qty,unitPrice:it.unitPrice,subtotal:it.subtotal,method:t.paymentMethod,txId:t.id
      });
    });
  });
  return rows.sort((a,b)=>new Date(b.ts)-new Date(a.ts));
}
function renderRecordsTab(){
  const ev=currentEvent();
  const f=state.recordsFilters;
  // 거래 단위로 필터링
  let txs=ev.transactions.slice().sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
  if(f.sessionId) txs=txs.filter(t=>t.sessionId===f.sessionId);
  if(f.artistId) txs=txs.filter(t=>t.items.some(i=>i.artistId===f.artistId));
  if(f.tagId) txs=txs.filter(t=>t.items.some(i=>{const p=ev.products.find(x=>x.id===i.productId);return p&&p.tagId===f.tagId;}));
  if(f.q) txs=txs.filter(t=>t.items.some(i=>(i.detailName||'').toLowerCase().includes(f.q.toLowerCase())));
  const total=txs.reduce((s,t)=>s+t.total,0);
  const totalItems=txs.reduce((s,t)=>s+t.items.reduce((ss,i)=>ss+i.qty,0),0);

  function txRowsHTML(t){
    const session=ev.sessions.find(s=>s.id===t.sessionId);
    const expanded=state.expandedTxIds.has(t.id);
    // 요약: 첫 번째 상품명 + 나머지 개수
    const firstItem=t.items[0];
    const moreCount=t.items.length-1;
    const summary=escapeHTML(firstItem?firstItem.detailName||'-':'')+(moreCount>0?' <span style="color:var(--muted);">외 '+moreCount+'개</span>':'');
    const artists=[...new Set(t.items.map(i=>i.artistName||'미지정'))].join(', ');
    const row=
      '<tr class="tx-row" data-action="toggleTx" data-id="'+t.id+'">'+
        '<td><span class="tx-chevron">'+(expanded?'▼':'▶')+'</span></td>'+
        '<td>'+fmtDateTime(t.timestamp)+'</td>'+
        '<td>'+escapeHTML(session?session.label:'(삭제된 세션)')+'</td>'+
        '<td>'+escapeHTML(artists)+'</td>'+
        '<td>'+summary+'</td>'+
        '<td><span class="badge '+(t.paymentMethod==='cash'?'badge-cash':'badge-transfer')+'">'+(t.paymentMethod==='cash'?'현금':'이체')+'</span></td>'+
        '<td style="font-weight:700;">'+won(t.total)+'</td>'+
        '<td><button class="btn btn-ghost" data-action="deleteTx" data-id="'+t.id+'">삭제</button></td>'+
      '</tr>';
    if(!expanded) return row;
    // 펼침: 상품별 상세
    const detail=
      '<tr><td colspan="8" style="padding:0;border-bottom:1px solid var(--border);">'+
        '<div class="tx-items-inner">'+
          t.items.map(it=>{
            const product=ev.products.find(p=>p.id===it.productId);
            const tag=product&&product.tagId?ev.tags.find(x=>x.id===product.tagId):null;
            return '<div class="tx-item-detail">'+
              '<span class="ti-name">'+escapeHTML(it.detailName||'-')+'</span>'+
              '<span class="ti-meta">'+escapeHTML(it.artistName||'미지정')+'</span>'+
              (tag?'<span class="ti-meta">'+escapeHTML(tag.name)+'</span>':'')+
              '<span class="ti-meta">'+it.qty+'개</span>'+
              '<span class="ti-meta">'+won(it.unitPrice)+'</span>'+
              '<span style="font-weight:700;font-size:12.5px;">'+won(it.subtotal)+'</span>'+
            '</div>';
          }).join('')+
        '</div>'+
      '</td></tr>';
    return row+detail;
  }

  return '<div class="row" style="flex-wrap:wrap;">'+
      '<div class="field" style="min-width:140px;"><label>세션</label>'+
        '<select class="select" data-change="recFilterSession"><option value="">전체</option>'+
        ev.sessions.map(s=>'<option value="'+s.id+'" '+(f.sessionId===s.id?'selected':'')+'>'+escapeHTML(s.label)+'</option>').join('')+
        '</select></div>'+
      '<div class="field" style="min-width:140px;"><label>작가</label>'+
        '<select class="select" data-change="recFilterArtist"><option value="">전체</option>'+
        ev.artists.map(a=>'<option value="'+a.id+'" '+(f.artistId===a.id?'selected':'')+'>'+escapeHTML(a.name)+'</option>').join('')+
        '</select></div>'+
      '<div class="field" style="min-width:140px;"><label>태그</label>'+
        '<select class="select" data-change="recFilterTag"><option value="">전체</option>'+
        ev.tags.map(t=>'<option value="'+t.id+'" '+(f.tagId===t.id?'selected':'')+'>'+escapeHTML(t.name)+'</option>').join('')+
        '</select></div>'+
      '<div class="field" style="min-width:140px;"><label>검색</label>'+
        '<input class="input" id="recSearch" data-livechange="recFilterQ" value="'+escapeHTML(f.q)+'" placeholder="세부품목명"></div>'+
    '</div>'+
    '<div class="card" style="overflow:auto;padding:0;">'+
      (txs.length===0?'<div class="empty" style="padding:40px 0;"><h3>기록이 없어요</h3><p>조건에 맞는 판매 기록이 없어요.</p></div>':
      '<table class="records"><thead><tr><th></th><th>시간</th><th>세션</th><th>작가</th><th>내역</th><th>결제</th><th>합계</th><th></th></tr></thead><tbody>'+
        txs.map(t=>txRowsHTML(t)).join('')+
      '</tbody></table>')+
    '</div>'+
    '<div style="margin-top:12px;padding:0 4px;font-size:14px;color:var(--muted);">'+txs.length+'건 · '+totalItems+'개 판매 · 합계 <strong style="color:var(--ink);">'+won(total)+'</strong></div>';
}
handlers.recFilterSession=(el)=>{state.recordsFilters.sessionId=el.value;renderTab();};
handlers.recFilterArtist=(el)=>{state.recordsFilters.artistId=el.value;renderTab();};
handlers.recFilterTag=(el)=>{state.recordsFilters.tagId=el.value;renderTab();};
handlers.recFilterQ=(el)=>{state.recordsFilters.q=el.value;renderTabPreserveFocus();};
onAction('toggleTx',(el)=>{
  const id=el.dataset.id;
  if(state.expandedTxIds.has(id)) state.expandedTxIds.delete(id); else state.expandedTxIds.add(id);
  renderTab();
});
onAction('deleteTx',(el)=>{
  const id=el.dataset.id;
  confirmAction('이 거래를 삭제할까요? 포함된 모든 상품 내역이 함께 삭제돼요.',async()=>{
    const ev=currentEvent();
    ev.transactions=ev.transactions.filter(t=>t.id!==id);
    state.expandedTxIds.delete(id);
    await saveEvent();renderTab();
    toast('거래를 삭제했어요');
  });
});
</script>
<script>
/* ============ expenses tab ============ */
function expenseRowText(x,ev){
  const session=ev.sessions.find(s=>s.id===x.sessionId);
  const sessionLabel=session?escapeHTML(session.label):'전체 기간';
  if((x.type||'common')==='separate'){
    const fromA=ev.artists.find(a=>a.id===x.fromArtistId);
    const toA=ev.artists.find(a=>a.id===x.toArtistId);
    return{
      t1:escapeHTML(x.label)+' · '+won(x.amount),
      t2:sessionLabel+' · 별도 지출 · '+(fromA?escapeHTML(fromA.name):'?')+' → '+(toA?escapeHTML(toA.name):'?')+(x.memo?' · '+escapeHTML(x.memo):'')
    };
  }
  const names=(x.splitArtistIds||[]).map(id=>{const a=ev.artists.find(y=>y.id===id);return a?a.name:null;}).filter(Boolean);
  const splitText=names.length?names.join('/')+' 분담 (각 '+won(x.amount/names.length)+')':'공통';
  return{
    t1:escapeHTML(x.label)+' · '+won(x.amount),
    t2:sessionLabel+' · 공통 지출 · '+escapeHTML(splitText)+(x.memo?' · '+escapeHTML(x.memo):'')
  };
}
function renderExpensesTab(){
  const ev=currentEvent();
  const commonTotal=ev.expenses.filter(x=>(x.type||'common')==='common').reduce((s,x)=>s+x.amount,0);
  return '<div style="display:flex;justify-content:flex-end;margin-bottom:12px;"><button class="btn btn-accent" data-action="newExpense">+ 지출 추가</button></div>'+
    (ev.expenses.length===0?'<div class="empty"><h3>지출 내역이 없어요</h3><p>부스비·택배비·별도 정산 등을 기록하면 정산에 반영돼요.</p></div>':
    '<div class="list">'+
      ev.expenses.slice().sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).map(x=>{
        const{t1,t2}=expenseRowText(x,ev);
        return '<div class="list-row">'+
            '<div class="main"><div class="t1">'+t1+'</div><div class="t2">'+t2+'</div></div>'+
            '<div class="row-actions"><button class="btn btn-ghost" data-action="editExpense" data-id="'+x.id+'">수정</button></div>'+
          '</div>';
      }).join('')+
    '</div>'+
    '<div style="margin-top:14px;font-size:14px;color:var(--muted);">공통 지출 합계 <strong style="color:var(--ink);">'+won(commonTotal)+'</strong></div>'
    );
}

let pendingSplitArtistIds=new Set();
let pendingExpenseType='common';

function splitArtistPickerHTML(ev){
  if(ev.artists.length===0) return '<p style="color:var(--muted);font-size:13px;margin:0;">등록된 작가가 없어요</p>';
  return ev.artists.map(a=>'<button type="button" class="chip '+(pendingSplitArtistIds.has(a.id)?'active':'')+'" data-action="toggleSplitArtist" data-id="'+a.id+'">'+escapeHTML(a.name)+'</button>').join('');
}
onAction('toggleSplitArtist',(el)=>{
  const id=el.dataset.id;
  if(pendingSplitArtistIds.has(id)) pendingSplitArtistIds.delete(id); else pendingSplitArtistIds.add(id);
  const area=document.getElementById('splitArtistArea');
  if(area) area.innerHTML=splitArtistPickerHTML(currentEvent());
});
onAction('setExpenseType',(el)=>{
  pendingExpenseType=el.dataset.type;
  document.querySelectorAll('[data-action="setExpenseType"]').forEach(b=>{
    b.classList.toggle('active',b.dataset.type===pendingExpenseType);
  });
  const c=document.getElementById('expCommonSection');
  const s=document.getElementById('expSeparateSection');
  if(c) c.classList.toggle('hidden',pendingExpenseType!=='common');
  if(s) s.classList.toggle('hidden',pendingExpenseType!=='separate');
});
function artistSelectHTML(fieldId,selectedId,ev){
  return '<select class="select" id="'+fieldId+'"><option value="">선택</option>'+
    ev.artists.map(a=>'<option value="'+a.id+'" '+(a.id===selectedId?'selected':'')+'>'+escapeHTML(a.name)+'</option>').join('')+
  '</select>';
}
function expenseFormHTML(x,ev){
  const type=(x&&x.type)||pendingExpenseType;
  const usedLabels=Array.from(new Set(ev.expenses.map(e=>e.label)));
  return '<div class="chip-row" style="margin-bottom:14px;">'+
      '<button type="button" class="chip '+(type==='common'?'active':'')+'" data-action="setExpenseType" data-type="common">공통 지출</button>'+
      '<button type="button" class="chip '+(type==='separate'?'active':'')+'" data-action="setExpenseType" data-type="separate">별도 지출</button>'+
    '</div>'+
    '<div class="field"><label>세션 (선택)</label><select class="select" id="f_exsession"><option value="">전체 기간</option>'+
      ev.sessions.map(s=>'<option value="'+s.id+'" '+(x&&x.sessionId===s.id?'selected':'')+'>'+escapeHTML(s.label)+'</option>').join('')+
    '</select></div>'+
    '<div class="field"><label>항목명</label><input class="input" id="f_exlabel" list="exLabelList" value="'+(x?escapeHTML(x.label):'')+'">'+
      '<datalist id="exLabelList">'+usedLabels.map(l=>'<option value="'+escapeHTML(l)+'">').join('')+'</datalist>'+
    '</div>'+
    '<div class="field"><label>금액</label><input class="input" type="number" inputmode="numeric" min="0" id="f_examount" placeholder="0" value="'+(x?x.amount:'')+'"></div>'+
    '<div id="expCommonSection" '+(type!=='common'?'class="hidden"':'')+'>'+
      '<div class="field"><label>나눠 부담할 작가 (비워두면 전체 공통)</label>'+
        '<div class="chip-row" id="splitArtistArea" style="margin-bottom:0;">'+splitArtistPickerHTML(ev)+'</div>'+
      '</div>'+
    '</div>'+
    '<div id="expSeparateSection" '+(type!=='separate'?'class="hidden"':'')+'>'+
      '<div class="row">'+
        '<div class="field"><label>납부 작가 (보내는 쪽)</label>'+artistSelectHTML('f_exfrom',x&&x.fromArtistId,ev)+'</div>'+
        '<div class="field"><label>수령 작가 (받는 쪽)</label>'+artistSelectHTML('f_exto',x&&x.toArtistId,ev)+'</div>'+
      '</div>'+
    '</div>'+
    '<div class="field"><label>메모 (선택)</label><input class="input" id="f_exmemo" value="'+(x?escapeHTML(x.memo||''):'')+'"></div>';
}
function readExpenseForm(){
  const type=pendingExpenseType;
  return{
    type,
    sessionId:document.getElementById('f_exsession').value||null,
    label:document.getElementById('f_exlabel').value.trim(),
    amount:Number(document.getElementById('f_examount').value)||0,
    memo:document.getElementById('f_exmemo').value.trim(),
    splitArtistIds:type==='common'?Array.from(pendingSplitArtistIds):[],
    fromArtistId:type==='separate'?(document.getElementById('f_exfrom').value||null):null,
    toArtistId:type==='separate'?(document.getElementById('f_exto').value||null):null
  };
}
onAction('newExpense',()=>{
  const ev=currentEvent();
  pendingSplitArtistIds=new Set();
  pendingExpenseType='common';
  openModal('<h3>지출 추가</h3>'+expenseFormHTML(null,ev)+
    '<div class="modal-actions">'+
      '<button class="btn" data-action="closeModal">취소</button>'+
      '<button class="btn btn-primary" data-action="saveNewExpense">추가</button>'+
    '</div>');
});
onAction('saveNewExpense',async()=>{
  const f=readExpenseForm();
  if(!f.label){toast('항목명을 입력해주세요');return;}
  if(f.type==='separate'&&(!f.fromArtistId||!f.toArtistId)){toast('납부·수령 작가를 모두 선택해주세요');return;}
  const ev=currentEvent();
  ev.expenses.push({id:uid(),timestamp:nowISO(),...f});
  await saveEvent();closeModal();renderTab();toast('지출을 추가했어요');
});
onAction('editExpense',(el)=>{
  const ev=currentEvent();
  const x=ev.expenses.find(e=>e.id===el.dataset.id);
  if(!x) return;
  pendingSplitArtistIds=new Set(x.splitArtistIds||[]);
  pendingExpenseType=x.type||'common';
  openModal('<h3>지출 수정</h3>'+expenseFormHTML(x,ev)+
    '<div class="modal-actions">'+
      '<button class="btn btn-danger" data-action="deleteExpense" data-id="'+x.id+'">삭제</button>'+
      '<button class="btn btn-primary" data-action="saveEditExpense" data-id="'+x.id+'">저장</button>'+
    '</div>');
});
onAction('saveEditExpense',async(el)=>{
  const ev=currentEvent();
  const x=ev.expenses.find(e=>e.id===el.dataset.id);
  if(!x) return;
  const f=readExpenseForm();
  if(!f.label){toast('항목명을 입력해주세요');return;}
  if(f.type==='separate'&&(!f.fromArtistId||!f.toArtistId)){toast('납부·수령 작가를 모두 선택해주세요');return;}
  Object.assign(x,f);
  await saveEvent();closeModal();renderTab();toast('지출을 수정했어요');
});
onAction('deleteExpense',(el)=>{
  const id=el.dataset.id;
  confirmAction('이 지출 내역을 삭제할까요?',async()=>{
    const ev=currentEvent();
    ev.expenses=ev.expenses.filter(x=>x.id!==id);
    await saveEvent();closeModal();renderTab();
  });
});
</script>
<script>
/* ============ settlement tab ============ */
function scopedTransactions(ev,sessionId){
  return sessionId?ev.transactions.filter(t=>t.sessionId===sessionId):ev.transactions;
}
function scopedExpenses(ev,sessionId){
  return sessionId?ev.expenses.filter(x=>x.sessionId===sessionId):ev.expenses;
}
const BREAKDOWN_MODES=[
  {id:'artist',label:'작가별'},
  {id:'product',label:'상품별'},
  {id:'detail',label:'세부품목별'},
  {id:'tag',label:'태그별'}
];
function computeBreakdown(txs,ev,mode){
  const map=new Map();
  function bump(key,label,sub,qty,amount){
    if(!map.has(key)) map.set(key,{label,sub:sub||'',qty:0,amount:0});
    const r=map.get(key); r.qty+=qty; r.amount+=amount;
  }
  txs.forEach(t=>t.items.forEach(it=>{
    if(mode==='artist'){
      bump(it.artistId||'__none',it.artistName||'미지정','',it.qty,it.subtotal);
    }else if(mode==='product'){
      bump(it.productId||it.detailName,it.detailName||'(이름 없음)',it.artistName||'',it.qty,it.subtotal);
    }else if(mode==='detail'){
      bump(it.detailName||'(이름 없음)',it.detailName||'(이름 없음)','',it.qty,it.subtotal);
    }else if(mode==='tag'){
      const product=ev.products.find(p=>p.id===it.productId);
      const tagId=product?product.tagId:null;
      let tagName;
      if(!tagId) tagName='태그 없음';
      else{ const tg=ev.tags.find(x=>x.id===tagId); tagName=tg?tg.name:'(삭제된 태그)'; }
      bump(tagId||'__none',tagName,'',it.qty,it.subtotal);
    }
  }));
  return map;
}
function computeExpenseBreakdown(exps,ev){
  const result=new Map();
  (ev.artists||[]).forEach(a=>result.set(a.id,{commonShare:0,owedOut:0,owedIn:0}));
  exps.forEach(x=>{
    if((x.type||'common')==='separate'){
      if(x.fromArtistId){
        const r=result.get(x.fromArtistId)||{commonShare:0,owedOut:0,owedIn:0};
        r.owedOut+=x.amount; result.set(x.fromArtistId,r);
      }
      if(x.toArtistId){
        const r=result.get(x.toArtistId)||{commonShare:0,owedOut:0,owedIn:0};
        r.owedIn+=x.amount; result.set(x.toArtistId,r);
      }
    }else{
      const ids=x.splitArtistIds||[];
      if(!ids.length) return;
      const share=x.amount/ids.length;
      ids.forEach(id=>{
        const r=result.get(id)||{commonShare:0,owedOut:0,owedIn:0};
        r.commonShare+=share; result.set(id,r);
      });
    }
  });
  return result;
}
/* legacy alias */
function computeExpenseShares(exps,ev){return computeExpenseBreakdown(exps,ev||{artists:[]});}
function breakdownTableHTML(map,mode,expBreakdown){
  const showSub=mode==='product';
  const showNet=mode==='artist';
  const nameHeader=mode==='artist'?'작가':mode==='product'?'상품':mode==='detail'?'세부품목명':'태그';
  if(map.size===0) return '<p style="color:var(--muted);font-size:14px;">판매 기록이 없어요</p>';
  return '<table class="records"><thead><tr>'+
      '<th>'+nameHeader+'</th>'+(showSub?'<th>작가</th>':'')+
      '<th>수량</th><th>매출</th>'+
      (showNet?'<th>공통 지출</th><th>별도↑보냄</th><th>별도↓받음</th><th>최종 정산액</th>':'')+
    '</tr></thead><tbody>'+
    Array.from(map.entries()).sort((a,b)=>b[1].amount-a[1].amount).map(([key,r])=>{
      const bd=showNet?(expBreakdown&&expBreakdown.get(key))||{commonShare:0,owedOut:0,owedIn:0}:{commonShare:0,owedOut:0,owedIn:0};
      const net=r.amount-bd.commonShare-bd.owedOut+bd.owedIn;
      return '<tr>'+
        '<td>'+escapeHTML(r.label)+'</td>'+(showSub?'<td>'+escapeHTML(r.sub||'미지정')+'</td>':'')+
        '<td>'+r.qty+'</td><td>'+won(r.amount)+'</td>'+
        (showNet?
          '<td>'+won(bd.commonShare)+'</td>'+
          '<td>'+(bd.owedOut>0?'-'+won(bd.owedOut):'-')+'</td>'+
          '<td>'+(bd.owedIn>0?'+'+won(bd.owedIn):'-')+'</td>'+
          '<td style="font-weight:700;">'+won(net)+'</td>'
        :'')+
      '</tr>';
    }).join('')+
  '</tbody></table>';
}
function renderSettlementTab(){
  const ev=currentEvent();
  const sid=state.settlementSessionId;
  const mode=state.settlementMode;
  const txs=scopedTransactions(ev,sid);
  const exps=scopedExpenses(ev,sid);
  const cash=txs.filter(t=>t.paymentMethod==='cash').reduce((s,t)=>s+t.total,0);
  const transfer=txs.filter(t=>t.paymentMethod==='transfer').reduce((s,t)=>s+t.total,0);
  const sales=cash+transfer;
  const expTotal=exps.reduce((s,x)=>s+x.amount,0);
  const net=sales-expTotal;
  const breakdown=computeBreakdown(txs,ev,mode);
  const expBreakdown=computeExpenseBreakdown(exps,ev);
  const modeLabel=BREAKDOWN_MODES.find(m=>m.id===mode).label;

  return '<div class="row" style="flex-wrap:wrap;">'+
      '<div class="field" style="max-width:220px;">'+
        '<label>정산 범위</label>'+
        '<select class="select" data-change="setSettlementSession"><option value="">전체 기간</option>'+
          ev.sessions.map(s=>'<option value="'+s.id+'" '+(sid===s.id?'selected':'')+'>'+escapeHTML(s.label)+'</option>').join('')+
        '</select>'+
      '</div>'+
      '<div class="field" style="max-width:220px;">'+
        '<label>매출 분류</label>'+
        '<select class="select" data-change="setSettlementMode">'+
          BREAKDOWN_MODES.map(m=>'<option value="'+m.id+'" '+(mode===m.id?'selected':'')+'>'+m.label+'</option>').join('')+
        '</select>'+
      '</div>'+
    '</div>'+
    '<div class="summary-cards">'+
      '<div class="summary-card"><div class="sc-label">현금 매출</div><div class="sc-val">'+won(cash)+'</div></div>'+
      '<div class="summary-card"><div class="sc-label">계좌이체 매출</div><div class="sc-val">'+won(transfer)+'</div></div>'+
      '<div class="summary-card"><div class="sc-label">총 매출</div><div class="sc-val">'+won(sales)+'</div></div>'+
      '<div class="summary-card"><div class="sc-label">총 지출</div><div class="sc-val">'+won(expTotal)+'</div></div>'+
      '<div class="summary-card" style="background:var(--accent-soft);"><div class="sc-label">순매출</div><div class="sc-val">'+won(net)+'</div></div>'+
    '</div>'+
    '<div class="card" style="margin-bottom:16px;">'+
      '<div class="section-title">'+modeLabel+' 매출'+(mode==='artist'?' (지출 분담 반영)':'')+'</div>'+
      breakdownTableHTML(breakdown,mode,expBreakdown)+
    '</div>'+
    '<div class="card" style="margin-bottom:16px;">'+
      '<div class="section-title">지출 내역</div>'+
      (exps.length===0?'<p style="color:var(--muted);font-size:14px;">지출 내역이 없어요</p>':
      '<table class="records"><thead><tr><th>구분</th><th>항목</th><th>금액</th><th>내용</th><th>메모</th></tr></thead><tbody>'+
        exps.map(x=>{
          const type=(x.type||'common');
          if(type==='separate'){
            const fromA=ev.artists.find(a=>a.id===x.fromArtistId);
            const toA=ev.artists.find(a=>a.id===x.toArtistId);
            return '<tr><td><span class="badge badge-transfer">별도</span></td><td>'+escapeHTML(x.label)+'</td><td>'+won(x.amount)+'</td>'+
              '<td>'+(fromA?escapeHTML(fromA.name):'?')+' → '+(toA?escapeHTML(toA.name):'?')+'</td><td>'+escapeHTML(x.memo||'-')+'</td></tr>';
          }
          const names=(x.splitArtistIds||[]).map(id=>{const a=ev.artists.find(y=>y.id===id);return a?a.name:null;}).filter(Boolean);
          return '<tr><td><span class="badge badge-cash">공통</span></td><td>'+escapeHTML(x.label)+'</td><td>'+won(x.amount)+'</td>'+
            '<td>'+(names.length?escapeHTML(names.join('/')):'전체')+'</td><td>'+escapeHTML(x.memo||'-')+'</td></tr>';
        }).join('')+
      '</tbody></table>')+
    '</div>'+
    '<div style="display:flex;gap:10px;flex-wrap:wrap;">'+
      '<button class="btn btn-primary" data-action="exportTransactions">거래내역 CSV 내보내기</button>'+
      '<button class="btn" data-action="exportSummary">정산요약 CSV 내보내기 (전체 분류 포함)</button>'+
    '</div>';
}
handlers.setSettlementSession=(el)=>{state.settlementSessionId=el.value;renderTab();};
handlers.setSettlementMode=(el)=>{state.settlementMode=el.value;renderTab();};

onAction('exportTransactions',()=>{
  const ev=currentEvent();
  const rows=[['세션','일시','작가','세부품목명','태그','수량','단가','합계','결제수단']];
  flattenTransactions(ev).slice().reverse().forEach(r=>{
    rows.push([r.sessionLabel,fmtDateTime(r.ts),r.artistName,r.detailName||'',r.tagName||'',r.qty,r.unitPrice,r.subtotal,r.method==='cash'?'현금':'계좌이체']);
  });
  exportCSV(rows,ev.name+'_거래내역.csv');
});
onAction('exportSummary',()=>{
  const ev=currentEvent();
  const sid=state.settlementSessionId;
  const scopeSession=sid?ev.sessions.find(s=>s.id===sid):null;
  const scopeLabel=scopeSession?scopeSession.label:'전체 기간';
  const txs=scopedTransactions(ev,sid);
  const exps=scopedExpenses(ev,sid);
  const cash=txs.filter(t=>t.paymentMethod==='cash').reduce((s,t)=>s+t.total,0);
  const transfer=txs.filter(t=>t.paymentMethod==='transfer').reduce((s,t)=>s+t.total,0);
  const expTotal=exps.reduce((s,x)=>s+x.amount,0);
  const expBreakdown=computeExpenseBreakdown(exps,ev);

  const rows=[
    ['정산 요약',scopeLabel],
    [],
    ['현금 매출',cash],['계좌이체 매출',transfer],['총 매출',cash+transfer],['총 지출',expTotal],['순매출',(cash+transfer)-expTotal],
    []
  ];
  rows.push(['작가별 매출 (지출 반영)']);
  rows.push(['작가','수량','매출','공통 지출','별도↑보냄','별도↓받음','최종 정산액']);
  Array.from(computeBreakdown(txs,ev,'artist').entries()).sort((a,b)=>b[1].amount-a[1].amount).forEach(([key,r])=>{
    const bd=expBreakdown.get(key)||{commonShare:0,owedOut:0,owedIn:0};
    rows.push([r.label,r.qty,r.amount,bd.commonShare,bd.owedOut,bd.owedIn,r.amount-bd.commonShare-bd.owedOut+bd.owedIn]);
  });
  rows.push([]);
  function appendBreakdown(title,mode,withSub){
    rows.push([title]);
    rows.push(withSub?['이름','작가','수량','매출']:['이름','수량','매출']);
    const map=computeBreakdown(txs,ev,mode);
    Array.from(map.values()).sort((a,b)=>b.amount-a.amount).forEach(r=>{
      rows.push(withSub?[r.label,r.sub||'미지정',r.qty,r.amount]:[r.label,r.qty,r.amount]);
    });
    rows.push([]);
  }
  appendBreakdown('상품별 매출','product',true);
  appendBreakdown('세부품목별 매출','detail',false);
  appendBreakdown('태그별 매출','tag',false);

  rows.push(['지출 항목','금액','분담 작가','메모']);
  exps.forEach(x=>{
    const names=(x.splitArtistIds||[]).map(id=>{const a=ev.artists.find(y=>y.id===id);return a?a.name:null;}).filter(Boolean);
    rows.push([x.label,x.amount,names.join('/')||'공통',x.memo||'']);
  });

  exportCSV(rows,ev.name+'_정산요약_'+scopeLabel+'.csv');
});
</script>
<script>
/* ============ init ============ */
function migrateEvent(ev){
  if(!ev.tags) ev.tags=[];
  ev.products.forEach(p=>{
    if(p.category){
      let tag=ev.tags.find(t=>t.name===p.category);
      if(!tag){ tag={id:uid(),name:p.category}; ev.tags.push(tag); }
      if(!p.tagId) p.tagId=tag.id;
      delete p.category;
    }
    if(p.tagIds){
      if(!p.tagId && p.tagIds.length) p.tagId=p.tagIds[0];
      delete p.tagIds;
    }
    if(p.tagId===undefined) p.tagId=null;
  });
  ev.expenses.forEach(x=>{
    if(!x.splitArtistIds) x.splitArtistIds=[];
    if(!x.type) x.type='common';
    if(x.fromArtistId===undefined) x.fromArtistId=null;
    if(x.toArtistId===undefined) x.toArtistId=null;
  });
}
async function init(){
  try{
    await openIDB().catch(()=>{});
    const saved=localStorage.getItem('ssc_room');
    if(saved){
      try{
        const exists=await fsRoomExists(saved);
        if(exists){
          state.roomCode=saved;
          await enterRoom(saved);
          return;
        }else{
          localStorage.removeItem('ssc_room');
        }
      }catch(e){
        localStorage.removeItem('ssc_room');
      }
    }
    renderRoomScreen();
  }catch(err){
    document.getElementById('mainContent').innerHTML=
      '<div class="empty"><h3>시작할 수 없어요</h3><p>'+escapeHTML(err&&err.message?err.message:String(err))+'</p></div>';
  }
}
window.addEventListener('DOMContentLoaded',init);
</script>
